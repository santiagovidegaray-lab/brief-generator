<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Brief Generator</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, sans-serif; background: #F8F7F4; color: #1a1a1a; min-height: 100vh; }

.setup { max-width: 480px; margin: 0 auto; padding: 80px 24px; text-align: center; }
.setup h1 { font-size: 24px; font-weight: 600; margin-bottom: 8px; }
.setup p { font-size: 14px; color: #888; margin-bottom: 32px; line-height: 1.6; }
.setup input { width: 100%; padding: 12px 16px; border: 1px solid #E0DED8; border-radius: 8px; font-size: 14px; background: #fff; margin-bottom: 12px; font-family: monospace; }
.setup button { width: 100%; padding: 12px; background: #1a1a1a; color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; }
.setup button:hover { background: #333; }

.app { display: none; max-width: 860px; margin: 0 auto; padding: 40px 32px 80px; }
.header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 40px; padding-bottom: 20px; border-bottom: 1px solid #E0DED8; }
.header h1 { font-size: 20px; font-weight: 600; }
.header span { font-size: 12px; color: #aaa; }

.controls { background: #fff; border: 1px solid #E0DED8; border-radius: 12px; padding: 24px; margin-bottom: 32px; }
.controls h2 { font-size: 15px; font-weight: 600; margin-bottom: 16px; }
.controls label { font-size: 12px; color: #888; display: block; margin-bottom: 6px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
.controls select, .controls input[type=text] { width: 100%; padding: 10px 12px; border: 1px solid #E0DED8; border-radius: 8px; font-size: 14px; background: #fff; margin-bottom: 16px; }
.generate-btn { background: #4A52C8; color: #fff; border: none; border-radius: 8px; padding: 12px 24px; font-size: 14px; font-weight: 500; cursor: pointer; width: 100%; }
.generate-btn:hover { background: #3a42b8; }
.generate-btn:disabled { background: #aaa; cursor: not-allowed; }

.brief { display: none; }
.brief-header { margin-bottom: 32px; }
.eyebrow { font-size: 11px; color: #888; letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 8px; }
.brief-title { font-size: 32px; font-weight: 600; letter-spacing: -0.5px; margin-bottom: 10px; }
.trend-badge { display: inline-block; font-size: 12px; font-weight: 500; padding: 4px 12px; border-radius: 99px; margin-bottom: 20px; }
.brief-desc { font-size: 15px; line-height: 1.8; color: #444; border-left: 3px solid; padding-left: 16px; margin-bottom: 40px; }

.section-label { font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: #bbb; margin-bottom: 20px; padding-bottom: 8px; border-bottom: 1px solid #f0f0f0; }

.ss-card { border: 1px solid #E8E8E8; border-radius: 12px; overflow: hidden; margin-bottom: 20px; }
.ss-body { padding: 24px 28px; }
.ss-head { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
.ss-num { width: 30px; height: 30px; color: #fff; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0; }
.ss-name { font-size: 16px; font-weight: 600; }
.ss-desc { font-size: 14px; color: #555; line-height: 1.7; margin-bottom: 16px; }

.img-area { background: #F5F5F5; border-radius: 8px; margin-bottom: 16px; overflow: hidden; min-height: 180px; display: flex; align-items: center; justify-content: center; position: relative; }
.img-area img { width: 100%; display: block; border-radius: 8px; }
.img-area .loading { font-size: 13px; color: #aaa; text-align: center; padding: 40px; }
.img-area .loading span { display: block; font-size: 11px; margin-top: 4px; color: #ccc; }
.img-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 12px; }
.img-grid img { width: 100%; border-radius: 6px; object-fit: cover; aspect-ratio: 9/16; cursor: pointer; border: 2px solid transparent; transition: border-color 0.15s; }
.img-grid img:hover { border-color: #4A52C8; }
.img-grid img.selected { border-color: #4A52C8; }

.ctas-block { border-radius: 8px; padding: 14px 18px; }
.ctas-label { font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: #aaa; margin-bottom: 10px; }
.cta-row { display: flex; gap: 10px; padding: 5px 0; border-bottom: 1px solid rgba(0,0,0,0.06); }
.cta-row:last-child { border-bottom: none; }
.cta-lang { font-size: 11px; font-weight: 700; min-width: 24px; }
.cta-text { font-size: 13px; color: #333; font-style: italic; }

.actions { display: flex; gap: 12px; margin-top: 40px; }
.actions button { flex: 1; padding: 12px; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; }
.btn-new { background: transparent; border: 1px solid #E0DED8; color: #555; }
.btn-download { background: #1a1a1a; border: none; color: #fff; }

.status { font-size: 13px; color: #888; text-align: center; padding: 12px; }
</style>
</head>
<body>

<div class="setup" id="setup">
  <h1>Brief Generator</h1>
  <p>Genera briefs de diseño para app store basados en trends reales de health & fitness, con imágenes de referencia generadas por IA.</p>
  <input type="password" id="apiKeyInput" placeholder="Pega tu Google AI Studio API key aquí" />
  <button onclick="startApp()">Continuar →</button>
</div>

<div class="app" id="app">
  <div class="header">
    <h1>Brief Generator</h1>
    <span>Health & Fitness · App Store</span>
  </div>

  <div class="controls">
    <h2>Nuevo brief</h2>
    <label>Tipo de app</label>
    <select id="appType">
      <option value="personalized_workout">Personalized Workout Plans</option>
      <option value="yoga">Yoga & Mindfulness</option>
      <option value="walking">Walking & Weight Loss</option>
      <option value="custom">Personalizado</option>
    </select>
    <div id="customInput" style="display:none">
      <label>Describe tu app</label>
      <input type="text" id="customDesc" placeholder="Ej: HIIT training for beginners" />
    </div>
    <button class="generate-btn" id="generateBtn" onclick="generateBrief()">Generar brief con imágenes</button>
    <p class="status" id="status" style="display:none"></p>
  </div>

  <div class="brief" id="brief"></div>
</div>

  API_KEY = key;
  document.getElementById('setup').style.display = 'none';
  document.getElementById('app').style.display = 'block';
}

  document.getElementById('customInput').style.display = this.value === 'custom' ? 'block' : 'none';
});

async function generateImage(prompt, style) {
  const fullPrompt = `App store screenshot mockup: ${prompt}. ${style}. Professional UI design, realistic mobile phone screen, high quality, clean design. No text overlays.`;
  
  const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/imagen-3.0-generate-002:predict?key=${API_KEY}`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      instances: [{ prompt: fullPrompt }],
      parameters: { sampleCount: 1, aspectRatio: "9:16" }
    })
  });

  const data = await response.json();
  const predictions = data?.predictions || [];
  if (predictions.length > 0 && predictions[0].bytesBase64Encoded) {
    return `data:image/png;base64,${predictions[0].bytesBase64Encoded}`;
  }
  return null;
}

  const briefDiv = document.getElementById('brief');

  currentAccent = config.accent;

      <button class="btn-new" onclick="resetBrief()">← Nuevo brief</button>

      { EN: 'Your plan evolves as you do.', ES: 'Tu plan evoluciona contigo.', PT: 'Seu plano evolui com você.', FR: 'Ton plan évolue avec toi.', DE: 'Dein Plan wächst mit dir.', IT: 'Il tuo piano cresce insieme a te.' },
      { EN: 'Real results. Tracked every step.', ES: 'Resultados reales. Cada paso registrado.', PT: 'Resultados reais. Cada passo acompanhado.', FR: 'De vrais résultats. Chaque étape suivie.', DE: 'Echte Ergebnisse. Jeden Schritt verfolgt.', IT: 'Risultati reali. Ogni passo monitorato.' },
    ],
    yoga: [
      { EN: 'Move well. Live longer. Feel better.', ES: 'Muévete bien. Vive más. Siéntete mejor.', PT: 'Mova-se bem. Viva mais. Sinta-se melhor.', FR: 'Bouge bien. Vis plus longtemps. Ressens mieux.', DE: 'Gut bewegen. Länger leben. Besser fühlen.', IT: 'Muoviti bene. Vivi di più. Stai meglio.' },
      { EN: 'Your practice. Your pace. Your goals.', ES: 'Tu práctica. Tu ritmo. Tus metas.', PT: 'Sua prática. Seu ritmo. Seus objetivos.', FR: 'Ta pratique. Ton rythme. Tes objectifs.', DE: 'Deine Praxis. Dein Tempo. Deine Ziele.', IT: 'La tua pratica. Il tuo ritmo. I tuoi obiettivi.' },
      { EN: 'Breathe in. Every session guided.', ES: 'Respira. Cada sesión, bien guiada.', PT: 'Respire. Cada sessão bem guiada.', FR: 'Inspire. Chaque session bien guidée.', DE: 'Einatmen. Jede Einheit gut begleitet.', IT: 'Respira. Ogni sessione ben guidata.' },

function resetBrief() {
  document.getElementById('brief').style.display = 'none';
  document.getElementById('brief').innerHTML = '';
}

function downloadBrief() {
  const content = document.getElementById('brief').innerHTML;
  const html = `<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Design Brief</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
